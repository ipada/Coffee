<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeCraft — بساز، بنوش، بچرخ</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E0A05;
  --bg2: #1A1008;
  --bg3: #251810;
  --cream: #F5EDD6;
  --cream2: #E8D9B8;
  --gold: #C8983A;
  --amber: #E8651A;
  --muted: #7A6040;
  --white: #FFFFFF;
  --green: #4CAF7A;
  --red: #E84040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--cream);
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(14,10,5,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(200,152,58,0.2);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.nav-logo {
  font-size: 1.4rem; font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  color: var(--cream2); text-decoration: none; font-size: 0.9rem;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--gold); }
.nav-actions { display: flex; gap: 0.75rem; align-items: center; }

/* BUTTONS */
.btn {
  padding: 0.5rem 1.25rem; border-radius: 100px; border: none;
  font-family: 'Vazirmatn', sans-serif; font-size: 0.875rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.btn-ghost {
  background: transparent; color: var(--cream); border: 1px solid rgba(200,152,58,0.4);
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--bg); box-shadow: 0 4px 20px rgba(232,101,26,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(232,101,26,0.45); }
.btn-lg { padding: 0.875rem 2rem; font-size: 1rem; }

/* HERO */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  padding-top: 64px;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(200,152,58,0.12) 0%, transparent 70%),
              radial-gradient(ellipse 50% 80% at 80% 80%, rgba(232,101,26,0.08) 0%, transparent 60%);
}
.hero-grid {
  position: absolute; inset: 0; opacity: 0.04;
  background-image: linear-gradient(var(--cream) 1px, transparent 1px),
                    linear-gradient(90deg, var(--cream) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-content {
  position: relative; z-index: 2;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
  align-items: center; max-width: 1200px; margin: 0 auto; padding: 2rem;
}
.hero-text h1 {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 900; line-height: 1.15;
  margin-bottom: 1.5rem;
}
.hero-text h1 span {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-text p {
  font-size: 1.1rem; color: var(--cream2); line-height: 1.8;
  margin-bottom: 2rem;
}
.hero-stats {
  display: flex; gap: 2rem; margin-top: 2.5rem;
  padding-top: 2rem; border-top: 1px solid rgba(200,152,58,0.2);
}
.stat-item { text-align: center; }
.stat-num {
  font-size: 1.75rem; font-weight: 900; color: var(--gold);
  display: block; line-height: 1;
}
.stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

/* CUP ANIMATION */
.hero-visual { display: flex; justify-content: center; align-items: center; }
.cup-scene { position: relative; width: 300px; height: 380px; }
.cup-svg { width: 100%; height: 100%; }
.steam-path {
  animation: steam 2.5s ease-in-out infinite;
  transform-origin: bottom center;
}
.steam-path:nth-child(2) { animation-delay: 0.5s; }
.steam-path:nth-child(3) { animation-delay: 1s; }
@keyframes steam {
  0%, 100% { opacity: 0; transform: translateY(0) scaleX(1); }
  40% { opacity: 0.8; transform: translateY(-20px) scaleX(1.2); }
  80% { opacity: 0; transform: translateY(-40px) scaleX(0.8); }
}
.liquid-fill {
  animation: liquidPulse 3s ease-in-out infinite;
}
@keyframes liquidPulse {
  0%, 100% { opacity: 0.9; }
  50% { opacity: 1; }
}
.cup-glow {
  position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
  width: 200px; height: 40px;
  background: radial-gradient(ellipse, rgba(200,152,58,0.3), transparent 70%);
  filter: blur(10px);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
}
.particles-container { position: absolute; inset: 0; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%;
  background: var(--gold); opacity: 0;
  animation: floatUp 4s ease-in infinite;
}

/* SECTIONS */
section { padding: 6rem 2rem; }
.section-label {
  font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1rem;
}
.section-title {
  font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 900; line-height: 1.2;
  margin-bottom: 1rem;
}
.section-sub { color: var(--muted); font-size: 1rem; line-height: 1.7; max-width: 480px; }
.section-header { margin-bottom: 3rem; }

/* BUILDER SECTION */
#builder {
  background: var(--bg2);
  border-top: 1px solid rgba(200,152,58,0.1);
  border-bottom: 1px solid rgba(200,152,58,0.1);
}
.builder-container { max-width: 1200px; margin: 0 auto; }
.builder-layout { display: grid; grid-template-columns: 1fr 360px; gap: 3rem; align-items: start; }
.builder-steps { display: flex; flex-direction: column; gap: 1.5rem; }

.step-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.15);
  border-radius: 16px; padding: 1.5rem;
  transition: border-color 0.2s;
}
.step-card:hover { border-color: rgba(200,152,58,0.3); }
.step-header {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;
}
.step-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--bg); font-weight: 900; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.step-title { font-size: 1rem; font-weight: 700; }

.options-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.opt-btn {
  padding: 0.4rem 0.9rem; border-radius: 100px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(200,152,58,0.2);
  color: var(--cream2); font-family: 'Vazirmatn', sans-serif; font-size: 0.82rem;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.opt-btn:hover { border-color: var(--gold); color: var(--gold); }
.opt-btn.selected {
  background: rgba(200,152,58,0.15); border-color: var(--gold); color: var(--gold);
}

.slider-row {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem;
}
.slider-label { font-size: 0.82rem; color: var(--muted); width: 80px; flex-shrink: 0; }
.slider-val { font-size: 0.82rem; color: var(--gold); width: 30px; text-align: left; }
input[type="range"] {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: rgba(200,152,58,0.2); border-radius: 2px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--gold); cursor: pointer;
  box-shadow: 0 0 8px rgba(200,152,58,0.5);
}

/* PREVIEW CARD */
.preview-card {
  position: sticky; top: 90px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.2);
  border-radius: 20px; padding: 1.75rem;
}
.preview-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
.preview-cup { text-align: center; margin-bottom: 1.5rem; }
.preview-cup-svg { width: 120px; height: 120px; }
.preview-name {
  font-size: 1.3rem; font-weight: 900; text-align: center; margin-bottom: 0.25rem;
}
.preview-desc { font-size: 0.82rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
.preview-bars { margin-bottom: 1.5rem; }
.bar-row { margin-bottom: 0.75rem; }
.bar-top { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; }
.bar-name { color: var(--muted); }
.bar-val { color: var(--cream2); }
.bar-track {
  height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--gold), var(--amber));
  transition: width 0.4s ease;
}
.preview-macros {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
  padding-top: 1.25rem; border-top: 1px solid rgba(200,152,58,0.15);
  margin-bottom: 1.5rem;
}
.macro-item { text-align: center; }
.macro-val { font-size: 1rem; font-weight: 700; color: var(--gold); }
.macro-unit { font-size: 0.65rem; color: var(--muted); }
.macro-name { font-size: 0.7rem; color: var(--muted); }
.preview-actions { display: flex; gap: 0.5rem; }
.preview-actions .btn { flex: 1; text-align: center; }

/* MENU SECTION */
#menu { background: var(--bg); }
.menu-container { max-width: 1200px; margin: 0 auto; }
.menu-tabs {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  border-bottom: 1px solid rgba(200,152,58,0.15);
  margin-bottom: 2.5rem; padding-bottom: 0;
}
.tab-btn {
  padding: 0.5rem 1.25rem; background: transparent; border: none;
  color: var(--muted); font-family: 'Vazirmatn', sans-serif; font-size: 0.9rem;
  cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent;
  margin-bottom: -1px; border-radius: 4px 4px 0 0;
}
.tab-btn:hover { color: var(--cream); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.menu-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;
}
.menu-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.1);
  border-radius: 14px; padding: 1.25rem;
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.menu-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(200,152,58,0.05), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.menu-item:hover { border-color: rgba(200,152,58,0.3); transform: translateY(-2px); }
.menu-item:hover::before { opacity: 1; }
.menu-item-emoji { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
.menu-item-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.25rem; }
.menu-item-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
.menu-item-price {
  margin-top: 0.75rem; font-size: 0.82rem; color: var(--gold); font-weight: 700;
}
.menu-panel { display: none; }
.menu-panel.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }

/* GAMIFICATION */
#gamify {
  background: var(--bg3);
  border-top: 1px solid rgba(200,152,58,0.1);
}
.gamify-container { max-width: 1200px; margin: 0 auto; }
.gamify-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
.level-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.2);
  border-radius: 20px; padding: 2rem;
}
.level-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.level-badge {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 900; color: var(--bg);
  box-shadow: 0 0 20px rgba(200,152,58,0.4);
}
.level-info h3 { font-size: 1.2rem; font-weight: 900; }
.level-info span { font-size: 0.8rem; color: var(--muted); }
.xp-bar-track {
  height: 12px; background: rgba(255,255,255,0.06); border-radius: 6px;
  overflow: hidden; margin-bottom: 0.5rem;
}
.xp-bar-fill {
  height: 100%; width: 68%; border-radius: 6px;
  background: linear-gradient(90deg, var(--gold), var(--amber));
  position: relative; overflow: hidden;
}
.xp-bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(200%); }
}
.xp-text { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
.achievements-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1.5rem; }
.ach-item {
  background: rgba(255,255,255,0.04); border-radius: 12px; padding: 0.875rem;
  text-align: center; border: 1px solid rgba(200,152,58,0.1);
  transition: all 0.2s;
}
.ach-item.earned { border-color: rgba(200,152,58,0.4); background: rgba(200,152,58,0.06); }
.ach-item:hover { transform: translateY(-2px); }
.ach-icon { font-size: 1.75rem; display: block; margin-bottom: 0.4rem; }
.ach-name { font-size: 0.7rem; font-weight: 700; color: var(--cream2); }
.ach-locked { opacity: 0.35; }
.challenges-list { display: flex; flex-direction: column; gap: 0.75rem; }
.challenge-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.12);
  border-radius: 12px; padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
}
.challenge-icon { font-size: 1.5rem; flex-shrink: 0; }
.challenge-info { flex: 1; }
.challenge-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
.challenge-desc { font-size: 0.75rem; color: var(--muted); }
.challenge-reward {
  background: rgba(200,152,58,0.1); border: 1px solid rgba(200,152,58,0.3);
  border-radius: 100px; padding: 0.25rem 0.75rem;
  font-size: 0.75rem; font-weight: 700; color: var(--gold); white-space: nowrap;
}

/* AI SECTION */
#ai { background: var(--bg); }
.ai-container { max-width: 900px; margin: 0 auto; text-align: center; }
.ai-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,152,58,0.2);
  border-radius: 24px; padding: 2.5rem;
  margin-top: 3rem;
}
.ai-chat { min-height: 240px; margin-bottom: 1.5rem; text-align: right; }
.ai-msg {
  display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: flex-start;
}
.ai-msg.user { flex-direction: row-reverse; }
.ai-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
}
.ai-bubble {
  background: rgba(200,152,58,0.08); border: 1px solid rgba(200,152,58,0.15);
  border-radius: 14px 14px 14px 4px;
  padding: 0.875rem 1.125rem; max-width: 80%;
  font-size: 0.9rem; line-height: 1.7; text-align: right;
}
.user-bubble {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px 14px 4px 14px;
  padding: 0.875rem 1.125rem; max-width: 80%;
  font-size: 0.9rem; line-height: 1.7; text-align: right;
}
.ai-input-row {
  display: flex; gap: 0.75rem; align-items: center;
}
.ai-input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(200,152,58,0.25);
  border-radius: 100px; padding: 0.75rem 1.25rem;
  color: var(--cream); font-family: 'Vazirmatn', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.ai-input:focus { border-color: var(--gold); }
.ai-input::placeholder { color: var(--muted); }
.ai-typing { display: flex; gap: 4px; align-items: center; padding: 0.5rem 0; }
.ai-typing span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
  animation: typingDot 1.2s ease-in-out infinite;
}
.ai-typing span:nth-child(2) { animation-delay: 0.2s; }
.ai-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* AMBIENT */
#ambient { background: var(--bg2); border-top: 1px solid rgba(200,152,58,0.1); }
.ambient-container { max-width: 900px; margin: 0 auto; text-align: center; }
.ambient-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem; }
.ambient-item {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(200,152,58,0.12);
  border-radius: 16px; padding: 1.5rem 1rem;
  cursor: pointer; transition: all 0.2s;
}
.ambient-item:hover { border-color: rgba(200,152,58,0.3); transform: translateY(-2px); }
.ambient-item.playing { border-color: var(--gold); background: rgba(200,152,58,0.06); }
.ambient-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
.ambient-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
.ambient-desc { font-size: 0.75rem; color: var(--muted); }
.ambient-wave {
  display: flex; justify-content: center; align-items: flex-end; gap: 3px;
  height: 24px; margin-top: 0.75rem;
}
.wave-bar {
  width: 4px; background: var(--gold); border-radius: 2px; opacity: 0;
  transition: opacity 0.3s;
}
.ambient-item.playing .wave-bar {
  opacity: 1; animation: waveDance 0.8s ease-in-out infinite alternate;
}
.wave-bar:nth-child(2) { animation-delay: 0.1s !important; }
.wave-bar:nth-child(3) { animation-delay: 0.2s !important; }
.wave-bar:nth-child(4) { animation-delay: 0.15s !important; }
.wave-bar:nth-child(5) { animation-delay: 0.05s !important; }
@keyframes waveDance {
  from { height: 4px; }
  to { height: 20px; }
}

/* FOOTER */
footer {
  background: var(--bg); border-top: 1px solid rgba(200,152,58,0.1);
  padding: 3rem 2rem;
  text-align: center;
}
.footer-logo {
  font-size: 1.75rem; font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 0.75rem;
}
.footer-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
.footer-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
.footer-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
.footer-links a:hover { color: var(--gold); }
.footer-copy { margin-top: 2rem; font-size: 0.75rem; color: rgba(122,96,64,0.6); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: rgba(26,16,8,0.95); border: 1px solid rgba(200,152,58,0.4);
  border-radius: 100px; padding: 0.75rem 1.5rem;
  font-size: 0.875rem; color: var(--cream); z-index: 999;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(10px);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .hero-content { grid-template-columns: 1fr; text-align: center; }
  .hero-visual { display: none; }
  .builder-layout { grid-template-columns: 1fr; }
  .preview-card { position: static; }
  .gamify-layout { grid-template-columns: 1fr; }
  .ambient-grid { grid-template-columns: repeat(2, 1fr); }
  .nav-links { display: none; }
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
