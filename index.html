<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کافه مینیمال | سفارش شخصی‌سازی شده</title>
    <style>
        /* === CSS Variables & Reset === */
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c2c2c;
            --accent-color: #8b5e3c;
            --accent-hover: #6b472b;
            --card-bg: #ffffff;
            --border-color: #eaeaeb;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem;
        }

        /* === Typography === */
        h1, h2, h3 {
            font-weight: 600;
            color: var(--text-color);
        }

        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 2.5rem; }
        .subtitle { text-align: center; color: #777; margin-bottom: 3rem; }

        /* === Layout === */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        /* === Menu Section === */
        .menu-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .category-title {
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            color: var(--accent-color);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .item-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .item-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .item-card.selected {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .item-ingredients {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.5rem;
            display: block;
        }
        
        .item-card.selected .item-ingredients { color: #f0f0f0; }

        /* === Customizer Section === */
        .customizer-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .addons-list {
            margin: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .addon-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        .btn-make {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 1rem;
        }

        .btn-make:hover { background-color: var(--accent-hover); }
        .btn-make:disabled { background-color: #ccc; cursor: not-allowed; }

        /* === Result Output === */
        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            background-color: #f4f1ea;
            border: 1px dashed var(--accent-color);
            display: none;
            text-align: center;
        }

        #result-box h3 { color: var(--accent-color); margin-bottom: 1rem; }
        .final-ingredients { font-style: italic; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1>کافه مینیمال</h1>
        <p class="subtitle">نوشیدنی یا دسر خود را انتخاب کنید، طعم‌ها را ترکیب کنید و لذت ببرید</p>
    </header>

    <main class="container">
        <!-- Menu Section -->
        <section class="menu-section">
            <h2>منوی کافه</h2>

            <h3 class="category-title">نوشیدنی‌های گرم ☕</h3>
            <div class="items-grid" id="hot-drinks"></div>

            <h3 class="category-title">نوشیدنی‌های سرد 🧊</h3>
            <div class="items-grid" id="cold-drinks"></div>

            <h3 class="category-title">دسرها 🍰</h3>
            <div class="items-grid" id="desserts"></div>
        </section>

        <!-- Customizer Section -->
        <section class="customizer-section">
            <h2>شخصی‌سازی سفارش</h2>
            <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">ابتدا یک آیتم از منو انتخاب کنید.</p>
            
            <div class="addons-list" id="addons-container">
                <!-- Addons will be injected here via JS -->
            </div>

            <button class="btn-make" id="make-btn" disabled>آماده‌سازی سفارش</button>

            <div id="result-box">
                <h3>سفارش شما آماده است! ✨</h3>
                <p id="final-name" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem;"></p>
                <p>ترکیبات: <span class="final-ingredients" id="final-ingredients"></span></p>
            </div>
        </section>
    </main>

    <script>
        // --- Data Structure ---
        const menu = {
            hot: [
                { id: 'h1', name: 'اسپرسو', ingredients: ['عصاره قهوه خالص'] },
                { id: 'h2', name: 'کاپوچینو', ingredients: ['اسپرسو', 'شیر بخار داده شده', 'فوم شیر'] },
                { id: 'h3', name: 'لاته', ingredients: ['اسپرسو', 'شیر گرم فراوان', 'کف شیر ملایم'] },
                { id: 'h4', name: 'چای ماسالا', ingredients: ['چای سیاه', 'شیر', 'زنجبیل', 'هل', 'دارچین', 'میخک'] }
            ],
            cold: [
                { id: 'c1', name: 'آیس لاته', ingredients: ['اسپرسو', 'شیر سرد', 'یخ'] },
                { id: 'c2', name: 'موخیتو', ingredients: ['نعناع تازه', 'لیمو ترش', 'سودا', 'یخ پودری'] },
                { id: 'c3', name: 'فراپوچینو', ingredients: ['قهوه بِلِند شده', 'شیر', 'یخ', 'خامه فرم گرفته'] }
            ],
            dessert: [
                { id: 'd1', name: 'کیک شکلاتی خیس', ingredients: ['آرد', 'پودر کاکائو غنی', 'کره', 'تخم‌مرغ', 'سس شکلات'] },
                { id: 'd2', name: 'چیزکیک نیویورکی', ingredients: ['پنیر خامه‌ای', 'بیسکویت دایجستیو', 'کره', 'وانیل'] },
                { id: 'd3', name: 'تیرامیسو', ingredients: ['پنیر ماسکارپونه', 'بیسکویت لیدی فینگر', 'قهوه', 'پودر کاکائو'] }
            ]
        };

        const addons = [
            { id: 'a1', name: 'شکر قهوه‌ای' },
            { id: 'a2', name: 'شات اضافه اسپرسو' },
            { id: 'a3', name: 'سیروپ کارامل' },
            { id: 'a4', name: 'سیروپ وانیل' },
            { id: 'a5', name: 'خامه اضافه' },
            { id: 'a6', name: 'یخ اضافه' }
        ];

        // --- State ---
        let selectedItem = null;
        let selectedAddons = [];

        // --- DOM Elements ---
        const hotContainer = document.getElementById('hot-drinks');
        const coldContainer = document.getElementById('cold-drinks');
        const dessertContainer = document.getElementById('desserts');
        const addonsContainer = document.getElementById('addons-container');
        const makeBtn = document.getElementById('make-btn');
        const resultBox = document.getElementById('result-box');

        // --- Functions ---
        function renderMenu(items, container) {
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div style="font-size: 1.1rem; font-weight: bold;">${item.name}</div>
                    <span class="item-ingredients">${item.ingredients.join('، ')}</span>
                `;
                div.onclick = () => selectItem(item, div);
                container.appendChild(div);
            });
        }

        function renderAddons() {
            addons.forEach(addon => {
                const label = document.createElement('label');
                label.className = 'addon-item';
                label.innerHTML = `
                    <input type="checkbox" value="${addon.name}" onchange="toggleAddon(this)">
                    ${addon.name}
                `;
                addonsContainer.appendChild(label);
            });
        }

        function selectItem(item, element) {
            // Remove selection from all cards
            document.querySelectorAll('.item-card').forEach(el => el.classList.remove('selected'));
            
            // Add selection to clicked card
            element.classList.add('selected');
            selectedItem = item;
            
            // Enable button and hide previous result
            makeBtn.disabled = false;
            resultBox.style.display = 'none';
        }

        window.toggleAddon = function(checkbox) {
            if (checkbox.checked) {
                selectedAddons.push(checkbox.value);
            } else {
                selectedAddons = selectedAddons.filter(addon => addon !== checkbox.value);
            }
        };

        makeBtn.onclick = () => {
            if (!selectedItem) return;

            // Prepare final data
            const baseIngredients = [...selectedItem.ingredients];
            const finalCombination = baseIngredients.concat(selectedAddons);

            // Update UI
            document.getElementById('final-name').innerText = selectedItem.name + (selectedAddons.length > 0 ? ' (شخصی‌سازی شده)' : '');
            document.getElementById('final-ingredients').innerText = finalCombination.join(' + ');
            
            // Show result with animation
            resultBox.style.display = 'block';
            resultBox.animate([
                { opacity: 0, transform: 'scale(0.95)' },
                { opacity: 1, transform: 'scale(1)' }
            ], { duration: 400, fill: 'forwards' });
        };

        // --- Initialization ---
        renderMenu(menu.hot, hotContainer);
        renderMenu(menu.cold, coldContainer);
        renderMenu(menu.dessert, dessertContainer);
        renderAddons();
    </script>
</body>
</html>
